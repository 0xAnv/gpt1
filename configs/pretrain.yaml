# ============================================================================
# GPT-1 Pre-Training Config
# ============================================================================
# All values here override ExperimentConfig defaults.
# Only specify values you want to change from the dataclass defaults.
#
# Paper reference: "Improving Language Understanding by Generative Pre-Training"
# Radford et al., 2018
# ============================================================================

# ── Model architecture (paper Table 1) ────────────────────────────────────
n_layers: 12
n_heads: 12
d_model: 768
d_ff: 3072                    # 4 × d_model
vocab_size: 40000

max_seq_len: 512
dropout: 0.1

# ── Pre-training hyperparameters ──────────────────────────────────────────
batch_size: 64
micro_batch_size: 8           # actual GPU batch; accumulate 8 steps → effective 64
lr: 2.5e-4                    # peak learning rate
warmup_steps: 2000            # linear warmup from 0 → lr
total_steps: 800000           # ~100 epochs on BooksCorpus
weight_decay: 0.01            # L2 on all params except biases & LayerNorm
grad_clip: 1.0                # global gradient norm clipping

# ── Adam optimizer ────────────────────────────────────────────────────────
adam_beta1: 0.9
adam_beta2: 0.999
adam_eps: 1.0e-8

# ── Learning rate schedule ────────────────────────────────────────────────
lr_schedule: "cosine"         # "cosine" | "linear"

# ── Precision & performance ──────────────────────────────────────────────
use_amp: true                 # mixed-precision (fp16) for RTX 3060
grad_checkpoint: false        # gradient checkpointing (trade compute for memory)
compile: false                # use PyTorch 2.0 torch.compile

# ── Paths ────────────────────────────────────────────────────────────────
data_dir: "data/"
checkpoint_dir: "checkpoints/"
resume_from: ""               # path to checkpoint to resume from (empty = start fresh)

# ── Logging ──────────────────────────────────────────────────────────────
wandb_project: "GPT1"
log_interval: 50              # log training metrics every N steps
eval_interval: 1000           # run validation every N steps
save_interval: 5000           # save checkpoint every N steps
generate_interval: 1000       # generate text samples every N steps

# ── Data pipeline ─────────────────────────────────────────────────────
dataset_name: "lucadiliello/bookcorpusopen"
val_split: 0.005
num_workers: 4
